name: 构建 Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v3

      - name: 设置 Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安装系统依赖和 Buildozer
        run: |
           # 1. 更新软件源并安装基础构建工具
             sudo apt-get update
             sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip autoconf libtool pkg-config zlib1g-dev libncurses5-dev libncursesw5-dev libtinfo5 cmake libffi-dev libssl-dev dpkg-dev libgtk-3-dev libgl1-mesa-dev libgles2-mesa-dev

             # 2. 升级 pip 防止版本过旧
             python -m pip install --upgrade pip

             # 3. 安装 buildozer 和 cython (指定较稳定的 cython 版本)
             # 注意：某些旧版 buildozer 对新版 cython 支持不好，这里锁定 cython 版本
             pip install --user buildozer cython==0.29.33

             # 4. 验证安装
             buildozer --version

      - name: 运行 Buildozer
        run: |
          buildozer -v android debug

      - name: 上传 APK 产物
        uses: actions/upload-artifact@v4
        with:
          name: my-game-apk
          path: bin/*.apk
